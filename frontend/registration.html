<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelShield | Secure Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=2070') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 1;
        }

        .login-card {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .brand-logo {
            font-size: 1.1rem;
            font-weight: 700;
            color: #475569;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        h1 {
            font-size: 2rem;
            color: #1e293b;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .input-group {
            position: relative;
            margin-bottom: 15px;
        }

        /* Fixed Icon Positions */
        .input-group .main-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        .input-group input {
            width: 100%;
            padding: 14px 45px; /* Space for icons on both sides */
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.95rem;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: #3b82f6;
        }

        /* Fixed Eye Icon position */
        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            cursor: pointer;
            padding: 5px;
            z-index: 10;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin: 15px 0;
            transition: 0.3s;
        }

        .btn-login:hover { background: #2563eb; }

        .social-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }

        .social-icon {
            font-size: 1.2rem;
            color: #334155;
            cursor: pointer;
        }

        .footer-text {
            font-size: 0.85rem;
            color: #64748b;
        }

        .footer-text a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="login-card">
        <div class="brand-logo">TravelShield</div>

        <h1>Register</h1>
        <p class="subtitle">Enter your details to Register</p>

        <form id="registrationForm">
          
            <div class="input-group">
                <input type="name" id="name" placeholder="Name" required>
            </div>
            <div class="input-group">
                <i class="fa-regular fa-envelope main-icon"></i>
                <input type="email" id="email" placeholder="Email address" required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-lock main-icon"></i>
                <input type="password" id="password" placeholder="Password" required>
                <i class="fa-regular fa-eye-slash password-toggle" id="togglePassword"></i>
            </div>

            <button type="button" class="btn-login" onclick="register()">REGISTER</button>

            <div class="social-container">
                <i class="fa-brands fa-google social-icon"></i>
                <i class="fa-brands fa-apple social-icon"></i>
                <i class="fa-brands fa-facebook-f social-icon"></i>
            </div>
        </form>

        <p class="footer-text">
            Already have account? <a href="login.html"> Login</a>
        </p>
    </div>

    <script>
        // 1. Password Visibility Toggle Logic
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');

        togglePassword.addEventListener('click', function (e) {
            // toggle the type attribute
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            // toggle the eye slash icon
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });

        // 2. Redirect Logic
        const loginForm = document.querySelector('#loginForm');
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault(); // Prevents page reload
            
            // This will trigger your app logic
            console.log("Redirecting to dashboard...");
            window.location.href = "login.html"; // Change this to your main app page
        });
    </script>

    <script src="js/app.js"></script>

</body>
