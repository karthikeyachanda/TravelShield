<!DOCTYPE html>
<html>

<head>
<title>Travel Safety Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
font-family:Arial;
}

#map{
height:500px;
width:100%;
}

button{
padding:10px;
margin-top:10px;
}

#chatbox{
margin-top:20px;
}
</style>

</head>

<body>

<h2>Travel Shield Dashboard</h2>

<div id="map"></div>

<br>

<button onclick="sendSOS()">SOS Emergency</button>


<!-- ✅ AI CHATBOT -->
<div style="margin-top:20px; border:1px solid #ccc; padding:10px; width:300px;">
    
<h3>AI Chatbot</h3>

<div id="chatArea" style="height:150px; overflow-y:auto; border:1px solid #ddd; padding:5px; margin-bottom:10px;"></div>

<input type="text" id="question" placeholder="Ask something..." style="width:70%; padding:5px;">
<button onclick="askAI()">Send</button>

</div>


<!-- ✅ TRANSLATOR -->
<div style="margin-top:20px; border:1px solid #ccc; padding:10px; width:300px;">

<h3>Translator</h3>

<input type="text" id="inputText" placeholder="Enter text" style="width:100%; padding:5px;"><br><br>

<select id="language">
<option value="Telugu">Telugu</option>
<option value="Hindi">Hindi</option>
<option value="English">English</option>
<option value="Tamil">Tamil</option>
</select>

<button onclick="translateText()">Translate</button>

<p id="translatedResult"></p>

</div>


<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<script>

// MAP
var map = L.map('map').setView([17.3850, 78.4867], 13)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map)


// LOCATION
navigator.geolocation.getCurrentPosition(function(position){

let userLat = position.coords.latitude
let userLon = position.coords.longitude

map.setView([userLat,userLon],15)

L.marker([userLat,userLon])
.addTo(map)
.bindPopup("You are here")
.openPopup()

},
function(error){
alert("Location denied → showing default location")
})


// LOAD INCIDENTS
async function loadIncidents(){

let response = await fetch("http://127.0.0.1:5000/incidents")
let incidents = await response.json()

incidents.forEach(function(incident){

L.marker([incident.latitude, incident.longitude])
.addTo(map)
.bindPopup(incident.description)

})

}

loadIncidents()


// SOS
function sendSOS(){

navigator.geolocation.getCurrentPosition(async function(position){

let latitude = position.coords.latitude
let longitude = position.coords.longitude

let response = await fetch("http://127.0.0.1:5000/sos",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
user_id:1,
latitude:latitude,
longitude:longitude
})
})

let data = await response.json()
alert(data.status)

})

}


// ✅ CHATBOT FUNCTION
async function askAI(){

let question = document.getElementById("question").value

if(question === "") return

let chatArea = document.getElementById("chatArea")

chatArea.innerHTML += "<p><b>You:</b> " + question + "</p>"

let response = await fetch("http://127.0.0.1:5000/ai-chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
question:question
})
})

let data = await response.json()

chatArea.innerHTML += "<p><b>AI:</b> " + data.answer + "</p>"

document.getElementById("question").value = ""
chatArea.scrollTop = chatArea.scrollHeight

}


// ✅ TRANSLATOR FUNCTION
async function translateText(){

let text = document.getElementById("inputText").value
let lang = document.getElementById("language").value

if(text === "") return

let response = await fetch("http://127.0.0.1:5000/translate",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
text:text,
target_lang:lang
})
})

let data = await response.json()

document.getElementById("translatedResult").innerText = data.translated_text

}

</script>

</body>
</html>
